<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Agência Criativa — Transformamos presença digital em crescimento real</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="Estruturas digitais completas para negócios que querem crescer de verdade."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0D0D0D;color:#F8F8F8;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

@font-face{font-family:'Space Grotesk';src:url('./fonts/SpaceGrotesk-Light.ttf') format('truetype');font-weight:300;font-display:swap;}
@font-face{font-family:'Space Grotesk';src:url('./fonts/SpaceGrotesk-Regular.ttf') format('truetype');font-weight:400;font-display:swap;}
@font-face{font-family:'Space Grotesk';src:url('./fonts/SpaceGrotesk-Medium.ttf') format('truetype');font-weight:500;font-display:swap;}
@font-face{font-family:'Space Grotesk';src:url('./fonts/SpaceGrotesk-SemiBold.ttf') format('truetype');font-weight:600;font-display:swap;}
@font-face{font-family:'Space Grotesk';src:url('./fonts/SpaceGrotesk-Bold.ttf') format('truetype');font-weight:700 900;font-display:swap;}

:root{
  --bg:#0D0D0D; --bg-light:#F4F4F2; --s1:#1A1A1A; --s2:#242424;
  --fg:#F8F8F8; --fg-2:#C7C7C7; --fg-3:#9A9A9A;
  --accent:#FF6B00; --green:#00E676;
  --v-bg:#0A1628; --v-violet:#9B6BFF; --v-border:rgba(155,107,255,0.22);
  --ease:cubic-bezier(0.22,1,0.36,1);
  --container:1280px;
}

/* ── Keyframes ── */
@keyframes fadeUp  {from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes scaleIn {from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
@keyframes lineW   {from{width:0}to{width:60px}}
@keyframes pulse   {0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* ── Load ── */
.load-0{animation:fadeUp .9s var(--ease) 0s   both}
.load-1{animation:fadeUp .9s var(--ease) .12s both}
.load-2{animation:fadeUp .9s var(--ease) .24s both}
.load-3{animation:fadeUp .9s var(--ease) .38s both}
.load-4{animation:fadeUp .9s var(--ease) .52s both}
.load-img{animation:scaleIn 1.1s var(--ease) .1s both}
.load-line{animation:lineW .8s var(--ease) .55s both}

/* ── Scroll reveal ── */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .75s var(--ease),transform .75s var(--ease);}
.reveal.shown{opacity:1;transform:translateY(0);}
.reveal-l{opacity:0;transform:translateX(-40px);transition:opacity .75s var(--ease),transform .75s var(--ease);}
.reveal-l.shown{opacity:1;transform:translateX(0);}
.reveal-r{opacity:0;transform:translateX(40px);transition:opacity .75s var(--ease),transform .75s var(--ease);}
.reveal-r.shown{opacity:1;transform:translateX(0);}
.reveal-scale{opacity:0;transform:scale(1.04);transition:opacity .85s var(--ease),transform .85s var(--ease);}
.reveal-scale.shown{opacity:1;transform:scale(1);}
.d1{transition-delay:.08s!important} .d2{transition-delay:.16s!important}
.d3{transition-delay:.24s!important} .d4{transition-delay:.32s!important}
.d5{transition-delay:.40s!important}

/* ── Nav ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:80;height:72px;display:flex;align-items:center;background:transparent;transition:background .3s var(--ease),border-color .3s;border-bottom:1px solid transparent;}
.nav.scrolled{background:rgba(13,13,13,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-color:rgba(255,255,255,0.07);}
.nav__inner{max-width:var(--container);width:100%;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
.nav__logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;}
/* Logo: JS controla filter+mixBlendMode via applyNavTheme() */
.nav__logo img{height:32px;width:auto;transition:filter .3s var(--ease);}
/* Texto Agência: escuro no hero claro, branco no fundo escuro */
.nav__logo-text{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:17px;letter-spacing:-0.02em;color:#0D0D0D;transition:color .3s var(--ease);}
.nav.scrolled .nav__logo-text{color:#F8F8F8;}
.nav.dark-hero .nav__logo-text{color:#F8F8F8;}
.nav__logo-text span{color:#FF6B00;}
.nav__links{display:flex;align-items:center;gap:28px;}
/* Links: semi-escuros no hero misto, claros no fundo escuro */
.nav__link{font-size:13.5px;font-weight:500;color:rgba(13,13,13,0.65);text-decoration:none;padding-bottom:2px;border-bottom:1px solid transparent;transition:color .2s var(--ease),border-color .15s;cursor:pointer;background:none;border-top:0;border-left:0;border-right:0;font-family:'Inter',sans-serif;}
.nav.scrolled .nav__link{color:#C7C7C7;}
.nav.dark-hero .nav__link{color:#C7C7C7;}
.nav__link:hover{color:#FF6B00;border-bottom-color:#FF6B00;}
.nav__link.active{color:#FF6B00;border-bottom-color:#FF6B00;}
.nav.scrolled .nav__link:hover{color:#F8F8F8;border-bottom-color:#FF6B00;}
.nav.scrolled .nav__link.active{color:#F8F8F8;border-bottom-color:#FF6B00;}
.nav.dark-hero .nav__link:hover{color:#F8F8F8;border-bottom-color:#FF6B00;}
.nav.dark-hero .nav__link.active{color:#F8F8F8;border-bottom-color:#FF6B00;}
.nav__cta{font-family:'Inter',sans-serif;font-weight:600;font-size:14px;background:#FF6B00;color:#0D0D0D;border:0;border-radius:999px;padding:11px 20px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18),0 6px 20px -6px rgba(255,107,0,0.5);transition:background .2s,transform .15s;white-space:nowrap;}
.nav__cta:hover{background:#FF8024;transform:translateY(-1px);}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:999px;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer;border:0;transition:all .2s var(--ease);text-decoration:none;padding:13px 24px;}
.btn-primary{background:#FF6B00;color:#0D0D0D;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18),0 8px 24px -8px rgba(255,107,0,0.55);}
.btn-primary:hover{background:#FF8024;transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),0 12px 32px -8px rgba(255,107,0,0.65);}
.btn-secondary{background:transparent;color:#F8F8F8;border:1.5px solid rgba(255,255,255,0.22);}
.btn-secondary:hover{border-color:rgba(255,255,255,0.5);transform:translateY(-2px);}
.btn-dark{background:transparent;color:#0D0D0D;border:1.5px solid rgba(0,0,0,0.22);}
.btn-dark:hover{border-color:rgba(0,0,0,0.5);transform:translateY(-2px);}
.btn-vision{background:linear-gradient(135deg,#9B6BFF,#6C3FC7);color:#fff;box-shadow:0 12px 36px -10px rgba(155,107,255,0.55);}
.btn-vision:hover{box-shadow:0 16px 40px -8px rgba(155,107,255,0.7);transform:translateY(-2px);}

/* ── Kicker + Line ── */
.kicker{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#FF6B00;}
.kicker-v{color:#9B6BFF;}
.kicker-dk{color:#FF6B00;}
.section-line{height:2px;background:#FF6B00;margin-bottom:20px;}
.section-line-v{height:2px;background:#9B6BFF;margin-bottom:20px;}

/* ── Hero ── */
.hero{position:relative;min-height:100vh;display:grid;grid-template-columns:55fr 45fr;}
.hero__left{background:#F4F4F2;display:flex;flex-direction:column;justify-content:center;padding:120px 56px 80px 40px;position:relative;z-index:2;}
.hero__inner{max-width:580px;margin-left:auto;}
.hero__h1{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(44px,5.5vw,76px);line-height:1.0;letter-spacing:-0.03em;color:#0D0D0D;}
.hero__h1 span{color:#FF6B00;}
.hero__lead{font-size:17px;line-height:1.65;color:#4A4A4A;margin-top:22px;max-width:480px;}
.hero__actions{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap;}
.hero__stats{display:flex;gap:36px;margin-top:52px;padding-top:36px;border-top:1px solid rgba(0,0,0,0.1);flex-wrap:wrap;}
.stat__n{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:38px;color:#0D0D0D;letter-spacing:-0.03em;line-height:1;}
.stat__l{font-size:12px;color:#7A7A7A;margin-top:5px;max-width:140px;line-height:1.4;}
/* hero right — watermark only */
.hero__right{position:relative;overflow:hidden;background:#0D0D0D;}
.hero__right::before{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to right,#F4F4F2 0%,rgba(244,244,242,0.6) 16%,rgba(244,244,242,0) 42%);}
.hero__wm{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hero__wm img{width:92%;height:92%;object-fit:contain;filter:invert(1);mix-blend-mode:screen;opacity:.12;transform:scale(1.08) translateX(8%);}

/* ── Services grid ── */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.06);}
.svc-card{background:#0D0D0D;padding:38px 30px;border-top:2px solid transparent;transition:border-color .3s,background .3s;cursor:pointer;}
.svc-card:hover{background:#141414;border-color:#FF6B00;}
.svc-icon{width:46px;height:46px;border-radius:14px;background:rgba(255,107,0,0.1);display:flex;align-items:center;justify-content:center;color:#FF6B00;margin-bottom:18px;}
.svc-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#FF6B00;margin-bottom:8px;}
.svc-h{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:#F8F8F8;margin-bottom:10px;}
.svc-p{font-size:14px;line-height:1.65;color:#9A9A9A;}

/* ── Stats band ── */
.stats-band{background:#FF6B00;padding:52px 40px;}
.stats-band__inner{max-width:var(--container);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.stats-n{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:46px;color:#0D0D0D;letter-spacing:-0.03em;line-height:1;}
.stats-l{font-size:13px;color:rgba(0,0,0,0.6);margin-top:5px;}

/* ── Section full-width text ── */
.sec-full{padding:80px 40px;}
.sec-full .inner{max-width:var(--container);margin:0 auto;}
.sec-h{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(32px,4vw,52px);letter-spacing:-0.02em;line-height:1.05;}
.check-list{list-style:none;margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px 32px;}
.check-list li{display:flex;align-items:flex-start;gap:12px;font-size:15px;line-height:1.55;color:#C7C7C7;}
.check-list--dk li{color:#3A3A3A;}
.ci{width:20px;height:20px;border-radius:50%;background:rgba(0,230,118,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.cd{width:7px;height:7px;border-radius:50%;background:#00E676;}

/* ── VISION hero-section ── */
.vision-sec{position:relative;overflow:hidden;padding:100px 40px 80px;background:linear-gradient(160deg,#0A1628 0%,#12093A 55%,#1A0A2E 100%);}
.vision-sec__bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:hidden;}
.vision-sec__bg-text{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(120px,22vw,340px);color:rgba(155,107,255,0.055);letter-spacing:-0.06em;line-height:1;user-select:none;white-space:nowrap;}
.vision-sec__glow{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 30%,rgba(155,107,255,0.3),transparent 60%);pointer-events:none;}
.vision-sec__inner{max-width:960px;margin:0 auto;position:relative;z-index:2;}
.vision-chips{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:40px;}
.vision-chip{background:rgba(20,12,50,0.65);backdrop-filter:blur(12px);border:1px solid rgba(155,107,255,0.25);border-radius:14px;padding:16px 18px;text-align:center;}
.vision-chip span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#fff;}

/* ── Split (kept for savings section) ── */
.split{display:grid;grid-template-columns:1fr 1fr;min-height:520px;}
.split__img{position:relative;overflow:hidden;min-height:460px;}
.split__img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 8s ease;}
.split__img:hover img{transform:scale(1.04);}
.split__overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,13,13,0.4),transparent 70%);}
.split__text{display:flex;flex-direction:column;justify-content:center;padding:72px 56px;}
.split__h{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(30px,3.2vw,44px);letter-spacing:-0.02em;line-height:1.05;}

/* ── Plans grid ── */
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.plan-card{background:#141414;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:30px;position:relative;transition:transform .3s var(--ease),border-color .3s;}
.plan-card:hover{transform:translateY(-4px);}
.plan-card--pop{border-color:#FF6B00;background:linear-gradient(180deg,#1f1408,#141414);box-shadow:0 24px 60px -20px rgba(255,107,0,0.4);}
.plan-badge{position:absolute;top:-12px;left:24px;background:#FF6B00;color:#0D0D0D;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:999px;}
.plan-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:24px;color:#F8F8F8;}
.plan-tag{font-size:13px;color:#9A9A9A;margin-top:5px;}
.plan-price{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:36px;color:#F8F8F8;letter-spacing:-0.02em;margin-top:18px;}
.plan-price span{font-family:'Inter',sans-serif;font-weight:400;font-size:13px;color:#9A9A9A;}
.plan-list{list-style:none;margin-top:20px;display:flex;flex-direction:column;gap:9px;}
.plan-list li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:#C7C7C7;line-height:1.5;}
.plan-list li svg{flex-shrink:0;margin-top:3px;}

/* ── Testimonials ── */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.testi-card{border-radius:20px;padding:30px;}
.testi-quote{font-family:'Space Grotesk',sans-serif;font-size:50px;line-height:.55;font-weight:800;color:#FF6B00;}
.testi-body{font-size:15px;line-height:1.7;margin-top:16px;}
.testi-author{display:flex;align-items:center;gap:12px;margin-top:22px;}
.testi-av{width:40px;height:40px;border-radius:50%;background:#242424;color:#FF6B00;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;}
.testi-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;}
.testi-role{font-size:12px;color:#9A9A9A;margin-top:2px;}

/* ── CTA band ── */
.cta-band{background:#F4F4F2;padding:96px 40px;text-align:center;}
.cta-band h2{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(34px,5vw,62px);color:#0D0D0D;letter-spacing:-0.03em;line-height:1.05;}
.cta-band p{font-size:17px;color:#5A5A5A;margin-top:16px;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.65;}
.cta-band .actions{display:flex;gap:12px;justify-content:center;margin-top:34px;flex-wrap:wrap;}

/* ── Footer ── */
.footer{background:#0D0D0D;border-top:1px solid rgba(255,255,255,0.06);padding:56px 40px 28px;}
.footer__grid{max-width:var(--container);margin:0 auto;display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;}
.footer__brand p{font-size:14px;color:#9A9A9A;margin-top:14px;max-width:270px;line-height:1.6;}
.footer__col h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#FF6B00;margin-bottom:14px;}
.footer__col a{display:block;font-size:14px;color:#C7C7C7;text-decoration:none;margin-bottom:8px;transition:color .15s;}
.footer__col a:hover{color:#F8F8F8;}
.footer__wm{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:clamp(44px,10vw,150px);letter-spacing:-0.04em;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.1);text-align:center;margin-top:56px;line-height:1;max-width:var(--container);margin-left:auto;margin-right:auto;}
.footer__bottom{max-width:var(--container);margin:18px auto 0;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.06);padding-top:18px;font-size:12px;color:#6B6B6B;}

/* ── Plan FAB ── */
.plan-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:70;display:inline-flex;align-items:center;gap:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;background:#FF6B00;color:#0D0D0D;border:0;border-radius:999px;padding:13px 22px;cursor:pointer;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18),0 10px 28px -6px rgba(255,107,0,0.55);animation:pulse 2.6s ease-in-out infinite;transition:transform .2s,box-shadow .2s;}
.plan-fab:hover{animation:none;transform:translateX(-50%) translateY(-4px) scale(1.03);box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),0 16px 40px -6px rgba(255,107,0,0.7);}
.fab-badge{background:rgba(13,13,13,0.2);color:#0D0D0D;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;}
/* ── WhatsApp FAB ── */
.wa-fab{position:fixed;bottom:24px;right:24px;z-index:70;width:56px;height:56px;border-radius:50%;background:#25D366;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px -6px rgba(37,211,102,0.6);transition:transform .2s var(--ease),box-shadow .2s;}
.wa-fab:hover{transform:translateY(-4px) scale(1.08);box-shadow:0 14px 36px -6px rgba(37,211,102,0.75);}
.wa-fab svg{width:28px;height:28px;fill:#fff;}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(6,6,6,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .25s var(--ease);}
.modal{background:rgba(18,18,18,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:28px;width:100%;max-width:520px;padding:38px;animation:fadeUp .35s var(--ease);}
.modal--wide{max-width:980px;display:grid;grid-template-rows:auto auto 1fr auto;max-height:88vh;overflow:hidden;padding:0;}
.modal__close{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#F8F8F8;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;font-size:16px;}
.modal__close:hover{background:rgba(255,255,255,0.06);}
.modal input{background:#0D0D0D;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 15px;color:#F8F8F8;font-family:'Inter',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .2s;}
.modal input:focus{border-color:#FF6B00;}
/* plan builder */
.pb-scroll{overflow-y:auto;padding:18px 30px 22px;}
.pb-scroll::-webkit-scrollbar{width:6px;}
.pb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.pb-tabs{display:flex;gap:8px;padding:18px 30px 0;}

const navLogoImg = document.querySelector('.nav__logo img');
const navLogoText = document.querySelector('.nav__logo-text');

function applyNavTheme(){
  const dark = navEl.classList.contains('scrolled') || navEl.classList.contains('dark-hero');
  /* PNG tem fundo branco: multiply remove bg branco no fundo claro;
     invert(1)+screen remove bg preto-invertido no fundo escuro — só o símbolo fica */
  if(dark){
    navLogoImg.style.filter       = 'invert(1)';
    navLogoImg.style.mixBlendMode = 'screen';
  } else {
    navLogoImg.style.filter       = 'none';
    navLogoImg.style.mixBlendMode = 'multiply';
  }
  navLogoText.style.color = dark ? '#F8F8F8' : '#0D0D0D';
}

window.addEventListener('scroll',()=>{
  navEl.classList.toggle('scrolled', window.scrollY > 60);
  applyNavTheme();
},{passive:true});

    {id:'video',ic:'🎥',title:'Vídeos',options:['4 Vídeos/mês (Reels)','8 Vídeos/mês (Reels + Depoimentos)']},
    {id:'site',ic:'🌐',title:'Manutenção de Site',options:['Atualização Mensal do Site']},
    {id:'ads',ic:'📊',title:'Tráfego Pago',options:['Meta Ads','Google Ads','Meta + Google Ads (completo)']},
    {id:'gmn',ic:'🔍',title:'Google Meu Negócio',options:['Otimização + Respostas']},
    {id:'extras',ic:'✨',title:'Adicionais',multi:true,options:['Cobertura de Evento/mês','Manutenção de Automações','Consultoria Mensal']},
  ]},
  {id:'unico',label:'Únicos',sections:[
    {id:'proj',ic:'🚀',title:'Projetos',multi:true,options:['Site Profissional','Landing Page','Automação WhatsApp','Sistema Personalizado','Identidade Visual']},
  ]},
];
let picks={},planTab='mensal';

function renderPlanBuilder(){
  const group=PLAN_GROUPS.find(g=>g.id===planTab);
  const total=Object.values(picks).reduce((n,v)=>n+(Array.isArray(v)?v.length:(v?1:0)),0);
  return`<div class="overlay" id="pb-overlay" onclick="if(event.target.id==='pb-overlay')closePB()">
  <div class="modal modal--wide" onclick="event.stopPropagation()">
    <div style="padding:26px 30px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;">
      <div>
        <p class="kicker">Monte seu plano</p>
        <h3 style="font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:24px;color:#F8F8F8;margin-top:6px;letter-spacing:-0.02em;">Crie seu plano personalizado</h3>
        <p style="font-size:13px;color:#9A9A9A;margin-top:5px;">Selecione os serviços. Pedimos a proposta sob medida ao final.</p>
      </div>
      <button class="modal__close" onclick="closePB()">✕</button>
    </div>
    <div class="pb-tabs">
      ${PLAN_GROUPS.map(g=>`<button class="pb-tab${planTab===g.id?' active':''}" onclick="switchTab('${g.id}')">${g.label}</button>`).join('')}
    </div>
    <div class="pb-scroll">
      ${group.sections.map(sec=>{
        const picked=picks[sec.id];
        return`<div style="margin-bottom:22px;">
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;">
            <span style="font-size:16px;">${sec.ic}</span>
            <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#F8F8F8;">${sec.title}</span>
            ${sec.multi?'<span style="font-size:11px;color:#6B6B6B;">(múltiplos)</span>':''}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${sec.options.map(opt=>{
              const active=sec.multi?(picked||[]).includes(opt):picked===opt;
              return`<button class="pb-pill${active?' active':''}" onclick="toggleP('${sec.id}','${opt.replace(/'/g,"\\'")}',${!!sec.multi})">${opt}</button>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="pb-footer">
      <div>
        <div style="font-size:12px;color:#9A9A9A;">${total} ${total===1?'serviço':'serviços'} selecionado${total!==1?'s':''}</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#F8F8F8;margin-top:2px;">Seu plano sob medida</div>
      </div>
      <button class="btn btn-primary" style="font-size:14px;" ${total===0?'disabled style="opacity:.4;cursor:not-allowed;"':''}>Solicitar proposta →</button>
    </div>
  </div>
</div>`;}

window.switchTab=tab=>{planTab=tab;document.getElementById('pb-overlay').outerHTML=renderPlanBuilder();};
window.toggleP=(sid,opt,multi)=>{
  if(multi){const a=new Set(picks[sid]||[]);a.has(opt)?a.delete(opt):a.add(opt);picks[sid]=[...a];}
  else{picks[sid]=picks[sid]===opt?null:opt;}
  document.getElementById('pb-overlay').outerHTML=renderPlanBuilder();
};
window.closePB=()=>{const el=document.getElementById('pb-overlay');if(el)el.remove();};

function openPB(){picks={};planTab='mensal';document.body.insertAdjacentHTML('beforeend',renderPlanBuilder());}

function bindCtasIn(scope){
  scope.querySelectorAll('[id$="-cta"],[id^="hero-"],[id^="results-"],[id^="cta-"],[id^="plan-cta-"],[id^="unico-cta-"],[id^="planos-cta"],[id^="vision-page-"],[id^="quem-cta"],[id^="servicos-cta"],[id^="oqf-cta"],[id^="pf-cta"]').forEach(el=>{
    if(el.id==='plan-builder-cta'){el.addEventListener('click',openPB);return;}
    if(el.id==='vision-cta'||el.id==='nav-vision-link'){el.addEventListener('click',()=>setRoute('vision'));return;}
    el.addEventListener('click',openContact);
  });
}

function render(){
  const root=document.getElementById('root');
  if(route==='home')           root.innerHTML=renderHome();
  else if(route==='o-que-fazemos') root.innerHTML=renderOQueFazemos();
  else if(route==='servicos')  root.innerHTML=renderServicos();
  else if(route==='planos')    root.innerHTML=renderPlanos();
  else if(route==='vision')    root.innerHTML=renderVision();
  else if(route==='quem-somos')root.innerHTML=renderQuemSomos();
  else if(route==='contato')   root.innerHTML=renderContato();
  else if(route==='portfolio') root.innerHTML=renderPortfolio();
  /* logo branca nas páginas com hero escuro; logo preta na home (hero claro esquerdo) */
  navEl.classList.toggle('dark-hero', route!=='home');
  applyNavTheme();
  bindCtasIn(root);
  updateNav();
  raf(observe);
}

document.getElementById('plan-fab').addEventListener('click',openPB);
render();
